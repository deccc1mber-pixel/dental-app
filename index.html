<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <h1>Dent-Master PRO</h1>
    <p class="subtitle">Ваша идеальная улыбка начинается здесь</p>

    <div class="doctors-row">
        <div class="doctor-card" onclick="selectDoc('Иванов')">
            <img src="doc1.jpg" class="doctor-avatar">
            <p>Др. Иванов</p>
        </div>
        <div class="doctor-card" onclick="selectDoc('Петров')">
            <img src="doc2.jpg" class="doctor-avatar">
            <p>Др. Петров</p>
        </div>
        </div>

    <div class="card">
        <h3>Записаться на сегодня:</h3>
        <div class="time-grid">
            <div class="time-slot">10:00</div>
            <div class="time-slot">14:00</div>
            <div class="time-slot">19:00</div>
        </div>
    </div>

    <button class="main-button">Записаться в 1 клик</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
